name: Build Windows ZIP Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-zip-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[qt]" pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name xdmfviewer `
            --distpath build\app `
            --workpath build\pyinstaller `
            --specpath build\spec `
            --paths src `
            --collect-data pyvista `
            --collect-data pyvistaqt `
            --collect-data qtpy `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --exclude-module IPython `
            --exclude-module ipywidgets `
            --exclude-module jupyter `
            --exclude-module notebook `
            --exclude-module panel `
            --exclude-module trame `
            --exclude-module trame_client `
            --exclude-module trame_server `
            --exclude-module trame_vtk `
            --exclude-module trame_vuetify `
            src/xdmfviewer/__main__.py

      - name: Verify build output
        shell: pwsh
        run: |
          $appExe = Join-Path (Get-Location) 'build\app\xdmfviewer\xdmfviewer.exe'
          if (-not (Test-Path $appExe)) {
            throw "Expected executable not found: $appExe"
          }

          $appRoot = Split-Path $appExe -Parent
          $fileCount = @(Get-ChildItem -Path $appRoot -File -Recurse).Count
          $folderSizeMb = (@(Get-ChildItem -Path $appRoot -File -Recurse | Measure-Object -Property Length -Sum).Sum) / 1MB
          Write-Host "Executable found: $appExe"
          Write-Host "Bundled file count: $fileCount"
          Write-Host "Bundle size: $($folderSizeMb.ToString('F2')) MB"

      - name: Create ZIP package
        shell: pwsh
        env:
          PRODUCT_VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:PRODUCT_VERSION
          $appRoot = Join-Path (Get-Location) 'build\app\xdmfviewer'
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          if (-not (Test-Path $appRoot)) {
            throw "Build output directory not found: $appRoot"
          }

          $outputPath = Join-Path (Get-Location) "dist\xdmfviewer-windows-$version.zip"
          if (Test-Path $outputPath) {
            Remove-Item -Path $outputPath -Force
          }

          $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue)
          if ($null -ne $sevenZip) {
            & $sevenZip.Source a -tzip -mx=9 $outputPath (Join-Path $appRoot '*') | Out-Host
          } else {
            Compress-Archive `
              -Path (Join-Path $appRoot '*') `
              -DestinationPath $outputPath `
              -CompressionLevel Optimal
          }

          $zipSize = (Get-Item $outputPath).Length / 1MB
          Write-Host "ZIP created: $outputPath"
          Write-Host "ZIP size: $($zipSize.ToString('F2')) MB"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/*.zip"
